    <style type="text/css">
      /* 容器：使用 flex 布局更容易控制位置 */
      .lang-dropdown {
        position: relative;
        display: inline-block;
        vertical-align: middle;
        box-sizing: border-box;
        flex-shrink: 0; /* 强制不压缩 */
        margin-left: 10px; /* 给它一点 左间距，防止贴着前面的图标 */
      }

      /* 按钮：自适应宽度，防止文字挤压 */
      .lang-dropbtn {
        background: linear-gradient(135deg, #ee76ee 0%, #c457be 70%);
        color: white;
        padding: 1px 1px;
        font-size: 10px;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        white-space: nowrap;
        /* 强制文字不换行 */
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        /* 图标和文字的间距 */
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        transition: all 0.3s ease;
        max-width: 70px;
        /* 限制最大宽度，防止太长 */
        overflow: hidden;
        /* 超出部分隐藏 */
        text-overflow: ellipsis;
        /* 超出显示省略号 */
      }

      .lang-dropbtn:active {
        transform: scale(0.95);
      }

      /* 下拉菜单：核心优化点 */
      .lang-dropdown-content {
        display: none;
        position: absolute;
        right: 0;
        left: auto;
        /* 靠右对齐，防止超出右侧屏幕 */
        background-color: #fff;
        min-width: 150px;
        /* 给一个合理的最小宽度 */
        width: max-content;
        /* 根据内容自动调整宽度 */
        max-width: 90vw;
        /* 关键：最大宽度不超过屏幕宽度的 90% */
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        z-index: 10001;
        border-radius: 12px;
        margin-top: 8px;
        max-height: 400px;
        overflow-y: auto;
        border: 1px solid rgba(0, 0, 0, 0.05);
      }

      /* 选项样式 */
      .lang-dropdown-content a {
        color: #333;
        padding: 12px 20px;
        text-decoration: none;
        display: block;
        font-size: 15px;
        border-bottom: 1px solid #f0f0f0;
        transition: background 0.2s;
        text-align: left;
      }

      .lang-dropdown-content a:last-child {
        border-bottom: none;
      }

      .lang-dropdown-content a:hover {
        background-color: #f9f8fa;
        color: #ea66d4;
      }

      /* 移动端小屏幕适配 */
      @media (max-width: 480px) {
        .lang-dropbtn {
          padding: 6px 10px;
          font-size: 12px;
        }

        /* 小屏优先“跟随按钮”定位，避免下拉框固定到屏幕底部 */
        .lang-dropdown-content {
          position: absolute;
          top: calc(100% + 8px);
          right: 0;
          left: auto;
          bottom: auto;
          max-width: calc(
            100vw - 20px - env(safe-area-inset-left) -
              env(safe-area-inset-right)
          );
        }

        /* 兜底：如果你希望在特别小屏时向上弹出，可给 .lang-dropdown 加 .drop-up */
        .lang-dropdown.drop-up .lang-dropdown-content {
          top: auto;
          bottom: calc(100% + 8px);
        }
      }

      /* 显示状态 */
      .show-lang {
        display: block;
        animation: fadeInDown 0.2s ease-out;
      }

      .mobile-header-actions {
        flex-wrap: nowrap;
        gap: 8px;
      }

      .mobile-header-actions > a,
      .mobile-header-actions > .lang-dropdown {
        flex: 0 0 auto;
      }

      .mobile-header-actions > a img {
        display: block;
        max-width: 28px;
        height: auto;
      }

      .mb_giftcode img {
        display: block;
        max-width: 100%;
        height: auto;
      }

      @media (max-width: 360px) {
        .mobile-header-actions > a img {
          max-width: 24px;
        }
      }

      .mobile-header-actions .lang-dropdown {
        margin-left: 0;
      }

      .mobile-header-actions .lang-dropbtn {
        max-width: none;
        font-size: 12px;
        padding: 6px 10px;
        gap: 6px;
      }

      /* PC / 宽屏：把语言切换放到 header 右侧，并确保可点击/不被遮挡 */
      .header-desktop-actions {
        align-items: center;
      }

      .header-desktop-actions .list-social {
        margin-left: auto;
        align-items: center;
      }

      .header-desktop-actions .lang-dropdown {
        margin-left: 12px;
      }

      @media (max-width: 360px) {
        .mobile-header-actions .lang-dropbtn {
          font-size: 11px;
          padding: 5px 8px;
        }
      }

      @keyframes fadeInDown {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      function closeWebViewModal() {
        document.getElementById("webview-overlay").style.display = "none";
        document.body.style.overflow = "auto";
      }

      // Copy link with modern clipboard API
      function copyLink() {
        const input = document.getElementById("link-input");
        const btn = document.querySelector(".copy-btn");

        if (navigator.clipboard) {
          navigator.clipboard.writeText(input.value).then(() => {
            showCopySuccess(btn);
          });
        } else {
          input.select();
          document.execCommand("copy");
          showCopySuccess(btn);
        }
      }

      function showCopySuccess(btn) {
        const originalText = btn.innerHTML;
        btn.innerHTML = "✅ Copied!";
        setTimeout(() => {

      // 4. 初始化加载
      document.addEventListener("DOMContentLoaded", function () {
        // 从本地获取保存的语言，如果没有则默认英文
        const savedLang = localStorage.getItem("selectedLang") || "en";
        if (document.getElementById("currentLangDisplay")) {
          document.getElementById("currentLangDisplay").innerHTML =
            langData[savedLang].name;
        }
        if (document.getElementById("currentLangDisplay-desktop")) {
          document.getElementById("currentLangDisplay-desktop").innerHTML =
           // langData[savedLang].name;
        }

        // 绑定点击事件控制菜单开关
        const btn = document.getElementById("currentLangDisplay");
        const menu = document.getElementById("langOptions");
        const btnDesktop = document.getElementById(
          "currentLangDisplay-desktop"
        );
        const menuDesktop = document.getElementById("langOptions-desktop");

        if (btn && menu) {
          btn.addEventListener("click", function (e) {
            e.stopPropagation();
            menu.classList.toggle("show-lang");
            if (menuDesktop) menuDesktop.classList.remove("show-lang");
          });
        }

        if (btnDesktop && menuDesktop) {
          btnDesktop.addEventListener("click", function (e) {
            e.stopPropagation();
            menuDesktop.classList.toggle("show-lang");
            if (menu) menu.classList.remove("show-lang");
          });
        }

        // 点击页面其他地方关闭菜单
        document.addEventListener("click", function () {
          if (menu) menu.classList.remove("show-lang");
          if (menuDesktop) menuDesktop.classList.remove("show-lang");
        });
      });
